# Disable web server — this is a STDIO-based CLI application
spring.main.web-application-type=none

# Suppress Spring Boot startup banner (banner to stdout breaks MCP STDIO protocol)
spring.main.banner-mode=off

# Route all logging to stderr so stdout is clean for JSON-RPC messages
logging.file.name=
logging.pattern.console=

# Browser configuration
browser.type=chromium
browser.headless=false
browser.timeout=30000
browser.viewport.width=1280
browser.viewport.height=720

# CDP daemon port — browser launched once on this port and kept alive across MCP server restarts
browser.cdp.port=9222

# Dedicated profile dir for the MCP browser daemon (isolates it from ChromeDriver/system Chrome).
# Leave blank to use the default: ~/playwright-mcp-profile
browser.user.data.dir=
