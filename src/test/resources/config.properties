# ── Date override (RS-T727) ───────────────────────────────────────────────────
# Server OS clock is ~107 days ahead. Setting 06/15/2026 (before the June 17
# AY cutoff) keeps the FAY 2025-26 loan period active so Direct Loans package.
# WARNING: never combine with server.date=true.
date.to.set=06/15/2026
ssh.username=
ssh.password=

